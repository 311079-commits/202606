<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>外幣匯率到價通知系統</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://accounts.google.com/gsi/client" async defer></script>
    <link rel="stylesheet" href="style.css">
</head>
<body class="bg-slate-50 text-slate-800 min-h-screen font-sans">

    <div id="login-section" class="flex flex-col items-center justify-center min-h-screen p-4">
        <div class="bg-white p-8 rounded-2xl shadow-xl max-w-md w-full text-center border border-slate-100">
            <div class="inline-flex items-center justify-center w-16 h-16 bg-blue-100 text-blue-600 rounded-2xl mb-4">
                <svg xmlns="http://www.w3.org/2000/svg" class="h-8 w-8" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 8c-1.657 0-3 .895-3 2s1.343 2 3 2 3 .895 3 2-1.343 2-3 2m0-8c1.11 0 2.08.402 2.599 1M12 8V7m0 1v8m0 0v1m0-1c-1.11 0-2.08-.402-2.599-1M21 12a9 9 0 11-18 0 9 9 0 0118 0z" />
                </svg>
            </div>
            <h1 class="text-2xl font-bold text-slate-900 mb-2">外幣匯率到價通知系統</h1>
            <p class="text-slate-500 mb-8 text-sm">請先使用 Google 帳戶登入以設定您的匯率監控通知</p>
            
            <div class="flex justify-center w-full">
                <div id="google-login-btn"></div>
            </div>
        </div>
    </div>

    <div id="main-section" class="hidden container mx-auto px-4 py-8 max-w-5xl">
        
        <header class="flex flex-col sm:flex-row justify-between items-center bg-white p-4 rounded-2xl shadow-sm border border-slate-100 mb-8 gap-4">
            <div class="flex items-center gap-3">
                <div class="bg-blue-600 text-white p-2 rounded-xl">
                    <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 19v-6a2 2 0 00-2-2H5a2 2 0 00-2 2v6a2 2 0 002 2h2a2 2 0 002-2zm0 0V9a2 2 0 012-2h2a2 2 0 012 2v10m-6 0a2 2 0 002 2h2a2 2 0 002-2m0 0V5a2 2 0 012-2h2a2 2 0 012 2v14a2 2 0 01-2 2h-2a2 2 0 01-2-2z" />
                    </svg>
                </div>
                <div>
                    <h2 class="text-lg font-bold text-slate-900">匯率監控儀表板</h2>
                    <p class="text-xs text-slate-500">自動化外幣到價郵件提醒</p>
                </div>
            </div>
            
            <div class="flex items-center gap-4">
                <button id="admin-toggle-btn" class="hidden bg-slate-800 hover:bg-slate-700 text-white px-4 py-2 rounded-xl text-sm font-medium transition-all shadow-sm">
                    💼 切換管理員後台
                </button>
                <div class="flex items-center gap-2 bg-slate-100 p-1.5 pr-4 rounded-full">
                    <img id="user-avatar" class="w-8 h-8 rounded-full border border-white shadow-sm" src="" alt="Avatar">
                    <span id="user-name" class="text-sm font-medium text-slate-700">Loading...</span>
                </div>
            </div>
        </header>

        <div class="grid grid-cols-1 lg:grid-cols-3 gap-8">
            <div class="lg:col-span-1">
                <div class="bg-white p-6 rounded-2xl shadow-sm border border-slate-100 sticky top-8">
                    <h3 class="text-lg font-bold text-slate-900 mb-4 flex items-center gap-2">
                        <span>📝 新增通知設定</span>
                    </h3>
                    <form id="alert-form" class="space-y-4">
                        <div>
                            <label class="block text-xs font-semibold text-slate-500 uppercase tracking-wider mb-1">通知電子信箱</label>
                            <input type="email" id="form-email" class="w-full bg-slate-50 text-slate-500 border border-slate-200 rounded-xl px-4 py-2.5 text-sm outline-none cursor-not-allowed" readonly>
                        </div>
                        
                        <div>
                            <label class="block text-xs font-semibold text-slate-500 uppercase tracking-wider mb-1">監控外幣幣別 (對台幣)</label>
                            <select id="form-currency" class="w-full bg-white border border-slate-200 rounded-xl px-4 py-2.5 text-sm outline-none focus:border-blue-500 transition-all">
                                <option value="USD">USD (美元)</option>
                                <option value="JPY">JPY (日圓)</option>
                                <option value="EUR">EUR (歐元)</option>
                                <option value="CNY">CNY (人民幣)</option>
                                <option value="KRW">KRW (韓圜)</option>
                                <option value="HKD">HKD (港元)</option>
                                <option value="GBP">GBP (英鎊)</option>
                                <option value="VND">VND (越南盾)</option>
                                <option value="TWD">TWD (台幣)</option>
                            </select>
                        </div>

                        <div>
                            <label class="block text-xs font-semibold text-slate-500 uppercase tracking-wider mb-1">觸發條件</label>
                            <select id="form-condition" class="w-full bg-white border border-slate-200 rounded-xl px-4 py-2.5 text-sm outline-none focus:border-blue-500 transition-all">
                                <option value="低於">低於 (&lt;)</option>
                                <option value="高於">高於 (&gt;)</option>
                            </select>
                        </div>

                        <div>
                            <label class="block text-xs font-semibold text-slate-500 uppercase tracking-wider mb-1">目標匯率價格</label>
                            <input type="number" step="any" id="form-target-rate" class="w-full bg-white border border-slate-200 rounded-xl px-4 py-2.5 text-sm outline-none focus:border-blue-500 transition-all" placeholder="例如: 日圓輸入 4.65，美金輸入 32.5">
                        </div>

                        <button type="submit" class="w-full bg-blue-600 hover:bg-blue-700 text-white font-medium py-3 rounded-xl transition-all shadow-md shadow-blue-100 flex items-center justify-center gap-2">
                            🚀 送出並啟動監控
                        </button>
                    </form>
                </div>
            </div>

            <div class="lg:col-span-2 space-y-6">
                <div class="bg-gradient-to-br from-blue-600 to-indigo-700 p-6 rounded-2xl text-white shadow-md">
                    <h3 class="font-bold text-lg mb-2">💡 運作說明與提醒</h3>
                    <ul class="text-sm space-y-2 text-blue-100 list-disc list-inside">
                        <li>系統每小時會自動向雲端獲取 Open Exchange Rates 最新牌價。</li>
                        <li>匯率計算統一以 <b>「1 台幣可兌換多少外幣」</b> 為基準。</li>
                        <li>當匯率滿足您設定的條件時，系統會自動發送 Email 提醒您，並將狀態更新為已寄出。</li>
                    </ul>
                </div>
            </div>
        </div>

        <section id="admin-section" class="hidden mt-12 pt-8 border-t border-slate-200 space-y-8">
            <div class="flex items-center gap-2">
                <span class="text-2xl">📊</span>
                <h3 class="text-xl font-bold text-slate-900">管理員控制後台</h3>
            </div>

            <div class="bg-white p-6 rounded-2xl shadow-sm border border-slate-100">
                <h4 class="text-sm font-semibold text-slate-500 uppercase tracking-wider mb-4">全站熱門訂閱外幣比例統計</h4>
                <div class="h-64 relative flex justify-center">
                    <canvas id="currencyChart"></canvas>
                </div>
            </div>

            <div class="bg-white rounded-2xl shadow-sm border border-slate-100 overflow-hidden">
                <div class="p-6 border-b border-slate-100">
                    <h4 class="text-sm font-semibold text-slate-500 uppercase tracking-wider">全站使用者通知設定歷史紀錄</h4>
                </div>
                <div class="overflow-x-auto">
                    <table class="w-full text-left border-collapse">
                        <thead>
                            <tr class="bg-slate-50 border-b border-slate-100 text-slate-400 text-xs font-semibold uppercase tracking-wider">
                                <th class="px-4 py-3">設定時間</th>
                                <th class="px-4 py-3">使用者 Email</th>
                                <th class="px-4 py-3">外幣</th>
                                <th class="px-4 py-3">條件</th>
                                <th class="px-4 py-3">目標匯率</th>
                                <th class="px-4 py-3">狀態</th>
                            </tr>
                        </thead>
                        <tbody id="admin-table-body" class="divide-y divide-slate-100 text-slate-700">
                            </tbody>
                    </table>
                </div>
            </div>
        </section>

    </div>

    <script src="script.js"></script>
</body>
</html>
